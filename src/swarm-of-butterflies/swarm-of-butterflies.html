<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swarm Of Butterflies</title>

    <style>
      /* Transparent background is required for OBS overlays */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: sans-serif;
      }

      /*  --- STYLE ELEMENTS ---  */

      /* Butterfly parent wrapper */
      .butterfly-container {
        position: absolute;
        width: 40px;
        height: 40px;
        bottom: -60px; /* Spawn positioned just beneath the viewport border */
        pointer-events: none;
        will-change: transform, opacity;
      }

      /* Wing container implementing 3D transforms */
      .butterfly {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        animation: flap 0.15s infinite alternate ease-in-out;
      }

      /* Core wing geometry */
      .wing {
        position: absolute;
        border-radius: 50% 50% 0 50%;
      }

      .wing.left {
        width: 22px;
        height: 30px;
        left: -2px;
        transform-origin: right center;
      }

      .wing.right {
        width: 22px;
        height: 30px;
        right: -2px;
        border-radius: 50% 50% 50% 0;
        transform-origin: left center;
      }

      /* Bottom secondary wings */
      .wing.bottom-left {
        width: 16px;
        height: 20px;
        top: 20px;
        left: 4px;
        border-radius: 50%;
        transform-origin: right top;
      }

      .wing.bottom-right {
        width: 16px;
        height: 20px;
        right: 4px;
        top: 20px;
        border-radius: 50%;
        transform-origin: left top;
      }

      /* Color Wings Palettes */
      .color-yellow .wing {
        background: radial-gradient(circle, #ffeb3b 60%, #fbc02d 100%);
        box-shadow: 0 0 8px rgba(253, 216, 53, 0.8);
      }

      .color-pink .wing {
        background: radial-gradient(circle, #ff8da1 60%, #e91e63 100%);
        box-shadow: 0 0 8px rgba(233, 30, 99, 0.8);
      }

      .color-red .wing {
        background: radial-gradient(circle, #ff8a80 60%, #f44336 100%);
        box-shadow: 0 0 8px rgba(244, 67, 54, 0.8);
      }

      .color-purple .wing {
        background: radial-gradient(circle, #d8b4fe 60%, #9333ea 100%);
        box-shadow: 0 0 8px rgba(147, 51, 234, 0.8);
      }

      .color-blueDark .wing {
        background: radial-gradient(circle, #93c5fd 60%, #1d4ed8 100%);
        box-shadow: 0 0 8px rgba(29, 78, 216, 0.8);
      }

      .color-blueLight .wing {
        background: radial-gradient(circle, #a5f3fc 60%, #00bcd4 100%);
        box-shadow: 0 0 8px rgba(0, 188, 212, 0.8);
      }

      .color-green .wing {
        background: radial-gradient(circle, #86efac 60%, #22c55e 100%);
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
      }

      .color-orange .wing {
        background: radial-gradient(circle, #fdba74 60%, #f97316 100%);
        box-shadow: 0 0 8px rgba(249, 115, 22, 0.8);
      }

      .color-white .wing {
        background: radial-gradient(circle, #ffffff 60%, #e0e0e0 100%);
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
      }

      /*  --- ANIMATIONS KEYFRAMES --- */

      /* Flapping effect using Y-axis rotation */
      @keyframes flap {
        0% {
          transform: rotateY(0deg);
        }
        100% {
          transform: rotateY(65deg);
        }
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  </head>
  <body>
    <script>
      // ==========================================
      // 1. CONFIGURATION
      // ==========================================

      const CONFIG = {
        count: 200,
        maxDelay: 5,
        colors: [
          "white",
          "red",
          "pink",
          "purple",
          "blueDark",
          "blueLight",
          "green",
          "yellow",
          "orange",
        ],
      };

      const TWITCH = {
        enabled: false,
        channel: "your_twitch_channel",
        command: "!butterflies",
      };

      // ==========================================
      // 2. CONSTANTS
      // ==========================================

      // ==========================================
      // 3. ANIMATION
      // ==========================================

      function createButterfly() {
        const container = document.createElement("div");
        container.className = "butterfly-container";

        const randomColor =
          CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];

        container.innerHTML = `
          <div class="butterfly color-${randomColor}">
            <div class="wing left"></div>
            <div class="wing right"></div>
            <div class="wing bottom-left"></div>
            <div class="wing bottom-right"></div>
          </div>
        `;

        // Calculate individual randomized behavior variables
        const startX = Math.random() * 100; // Horizon positioning (0% to 100%)
        const scale = 0.3 + Math.random() * 0.8; // Depth perception scaling
        const duration = 4 + Math.random() * 3; // Flight travel time up the screen
        const delay = Math.random() * CONFIG.maxDelay; // Launch staggering offset
        const zigzagIntensity = 40 + Math.random() * 120; // Sinuous path amplitude
        const zigzagSpeed = 2 + Math.random() * 3; // Sinuous frequency rate

        container.style.left = `${startX}%`;
        document.body.appendChild(container);

        let startTime = null;

        function animate(timestamp) {
          if (!startTime) startTime = timestamp;
          const elapsed = (timestamp - startTime) / 1000 - delay;

          if (elapsed >= 0) {
            const progress = elapsed / duration;

            if (progress <= 1) {
              const y = progress * (window.innerHeight + 120);
              const x =
                Math.sin(progress * Math.PI * zigzagSpeed) * zigzagIntensity;

              // Fade out smoothly over the final 15% of the trajectory lifetime
              const opacity = progress > 0.85 ? (1 - progress) * 6.6 : 1;

              container.style.transform = `translate3d(${x}px, -${y}px, 0) scale(${scale})`;
              container.style.opacity = opacity;

              requestAnimationFrame(animate);
            } else {
              container.remove(); // Delete element from DOM once off-screen
            }
          } else {
            requestAnimationFrame(animate);
          }
        }

        requestAnimationFrame(animate);
      }

      function triggerButterflyShower() {
        for (let i = 0; i < CONFIG.count; i++) {
          createButterfly();
        }
      }

      // ==========================================
      // 3. CALLBACK (COMFYJS)
      // ==========================================

      if (location.search.includes("preview")) triggerButterflyShower();

      if (TWITCH.enabled) {
        ComfyJS.onCommand = (_, command) => {
          if (`!${command}`.toLowerCase() === TWITCH.command.toLowerCase())
            triggerButterflyShower();
        };
        ComfyJS.Init(TWITCH.channel);
      }
    </script>
  </body>
</html>
