<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spread Love Rainbow</title>

    <style>
      /* Transparent background is required for OBS overlays */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: sans-serif;
      }

      /* Canvas styling for OBS overlays */
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  </head>
  <body>
    <canvas id="love-canvas"></canvas>

    <script>
      // ==========================================
      // 1. CONFIGURATION
      // ==========================================

      const COLOR_OPTIONS = {
        white: "#ffffff",
        red: "#ff3b30",
        pink: "#ff4081",
        purple: "#a855f7",
        blueDark: "#1d4ed8",
        blueLight: "#00d4ff",
        green: "#44e09c",
        yellow: "#ffeb3b",
        orange: "#ff9800",
      };

      const CONFIG = {
        count: 200,
        duration: 5000,
        minSize: 10,
        maxSize: 40,
        speedMultiplier: 3,
        originSpread: 0.3,
        colors: [
          "white",
          "red",
          "pink",
          "purple",
          "blueDark",
          "blueLight",
          "green",
          "yellow",
          "orange",
        ],
      };

      const TWITCH = {
        enabled: false,
        channel: "your_twitch_channel",
        command: "!spreadlove",
      };

      // ==========================================
      // 2. CONSTANTS
      // ==========================================

      const canvas = document.querySelector("#love-canvas");
      const ctx = canvas.getContext("2d");

      let hearts = [];

      // Dynamically resize the canvas to fill the window
      const resizeCanvas = () => {
        canvas.width = innerWidth * devicePixelRatio;
        canvas.height = innerHeight * devicePixelRatio;
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      };
      addEventListener("resize", resizeCanvas);
      resizeCanvas();

      // ==========================================
      // 3. ANIMATION
      // ==========================================

      function triggerSpreadLove() {
        const now = performance.now();
        const origin = {
          x: innerWidth * (0.5 + (Math.random() - 0.5) * CONFIG.originSpread),
          y: innerHeight * (0.5 + (Math.random() - 0.5) * CONFIG.originSpread),
        };

        // Keep existing hearts so every trigger adds a new burst to the canvas.
        for (let i = 0; i < CONFIG.count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = (1 + Math.random() * 6) * CONFIG.speedMultiplier;

          hearts.push({
            x: origin.x,
            y: origin.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1.5,
            size:
              CONFIG.minSize +
              Math.random() * (CONFIG.maxSize - CONFIG.minSize),
            color:
              COLOR_OPTIONS[CONFIG.colors[i % CONFIG.colors.length]] ??
              CONFIG.colors[i % CONFIG.colors.length],
            born: now,
          });
        }
      }

      function frame(now) {
        ctx.clearRect(0, 0, innerWidth, innerHeight);

        hearts = hearts.filter((heart) => {
          const age = now - heart.born;
          if (age > CONFIG.duration) return false;
          heart.x += heart.vx;
          heart.y += heart.vy;
          heart.vy += 0.018 * CONFIG.speedMultiplier;
          ctx.globalAlpha = 1 - age / CONFIG.duration;
          ctx.fillStyle = heart.color;
          ctx.font = `${heart.size}px serif`;
          ctx.fillText("♥", heart.x, heart.y);
          return true;
        });

        ctx.globalAlpha = 1;

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);

      // ==========================================
      // 3. CALLBACK (COMFYJS)
      // ==========================================

      if (location.search.includes("preview")) triggerSpreadLove();

      if (TWITCH.enabled) {
        ComfyJS.onCommand = (_, command) => {
          if (`!${command}`.toLowerCase() === TWITCH.command.toLowerCase())
            triggerSpreadLove();
        };
        ComfyJS.Init(TWITCH.channel);
      }
    </script>
  </body>
</html>
