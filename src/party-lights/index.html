<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS — Party Lights</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent}#stage{position:fixed;inset:0;pointer-events:none;opacity:0}.active{animation:party var(--duration) linear forwards}@keyframes party{0%,100%{opacity:0}5%,95%{opacity:1}}.beam{position:absolute;width:35vmax;height:160vmax;top:-30vmax;left:calc(var(--x) * 1%);transform-origin:top center;background:linear-gradient(90deg,transparent,var(--color),transparent);mix-blend-mode:screen;filter:blur(15px);animation:sweep .8s ease-in-out infinite alternate}@keyframes sweep{to{transform:rotate(var(--rotate)) translateX(10vw)}}.flash{position:absolute;inset:0;background:radial-gradient(circle at center,#fff8,transparent 45%);animation:flash .45s infinite alternate}@keyframes flash{to{opacity:.1}}
  </style>
  <script src="https://unpkg.com/comfy.js@latest/dist/comfy.min.js"></script>
</head>
<body>
  <div id="stage" aria-hidden="true"></div>
  <script>
    // Configuration — adjust these values for this browser source.
    const CONFIG = { beams: 7, duration: 7000, delay: 90, colors: ['#ff007a','#00e5ff','#8dff00','#ffca28','#a855f7'] };
    // Constants
    const TWITCH = { enabled: false, channel: "your_twitch_channel", command: "!party" };
    const stage = document.querySelector('#stage');
    // Main animation logic
    function play() { stage.replaceChildren(); stage.style.setProperty('--duration', `${CONFIG.duration}ms`); for(let i=0;i<CONFIG.beams;i++){const beam=document.createElement('i');beam.className='beam';beam.style.setProperty('--x', i*100/(CONFIG.beams-1));beam.style.setProperty('--color',CONFIG.colors[i%CONFIG.colors.length]);beam.style.setProperty('--rotate',`${(i-CONFIG.beams/2)*12}deg`);stage.append(beam)} const flash=document.createElement('i');flash.className='flash';stage.append(flash);stage.classList.remove('active');void stage.offsetWidth;stage.classList.add('active');setTimeout(()=>stage.replaceChildren(),CONFIG.duration); }
    // Twitch trigger with ComfyJS
    if (location.search.includes('preview')) play();
    if (TWITCH.enabled) { ComfyJS.onCommand = (_, command) => { if (`!${command}`.toLowerCase() === TWITCH.command.toLowerCase()) play(); }; ComfyJS.Init(TWITCH.channel); }
  </script>
</body>
</html>
