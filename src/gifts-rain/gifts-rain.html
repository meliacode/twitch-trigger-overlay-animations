<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gifts Rain</title>

    <style>
      /* Transparent background is required for OBS overlays */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: sans-serif;
      }

      /* Canvas styling for OBS overlays */
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  </head>
  <body>
    <canvas id="gifts-canvas"></canvas>

    <script>
      // ==========================================
      // 1. CONFIGURATION
      // ==========================================

      const COLOR_OPTIONS = {
        white: "#ffffff",
        red: "#ff3b30",
        pink: "#ff4081",
        purple: "#a855f7",
        blueDark: "#1d4ed8",
        blueLight: "#00d4ff",
        green: "#44e09c",
        yellow: "#ffeb3b",
        orange: "#ff9800",
      };

      const CONFIG = {
        count: 200,
        minSize: 15,
        maxSize: 40,
        speedMultiplier: 1.2,
        colors: [
          "white",
          "red",
          "pink",
          "purple",
          "blueDark",
          "blueLight",
          "green",
          "yellow",
          "orange",
        ],
      };

      const TWITCH = {
        enabled: false,
        channel: "your_twitch_channel",
        command: "!gifts",
      };

      // ==========================================
      // 2. CONSTANTS
      // ==========================================

      const canvas = document.getElementById("gifts-canvas");
      const ctx = canvas.getContext("2d");

      const giftList = [];

      // Dynamic canvas resizing to match OBS source dimensions
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      // ==========================================
      // 3. ANIMATION
      // ==========================================

      class Gift {
        constructor() {
          // Randomize horizontal spawn across screen width
          this.x = Math.random() * canvas.width;

          // Stagger spawn height off-screen between -50px and -1250px for a natural rain effect
          this.y = Math.random() * -1200 - 50;

          this.size =
            Math.random() * (CONFIG.maxSize - CONFIG.minSize) + CONFIG.minSize;

          // Set box color and contrast-matched ribbon color
          const colors = CONFIG.colors.map(
            (color) => COLOR_OPTIONS[color] ?? color,
          );
          this.baseColor = colors[Math.floor(Math.random() * colors.length)];
          const alternateColors = colors.filter(
            (color) => color !== this.baseColor,
          );
          this.ribbonColor =
            alternateColors[0] ??
            (this.baseColor === COLOR_OPTIONS.white ||
            this.baseColor === COLOR_OPTIONS.yellow
              ? COLOR_OPTIONS.blueDark
              : COLOR_OPTIONS.white);

          // Physics and drift properties
          this.speedY = (240 + Math.random() * 180) * CONFIG.speedMultiplier;
          this.speedX = Math.random() * 120 - 60;
          this.swaySpeed = Math.random() * 0.05 + 0.02;
          this.swayOffset = Math.random() * Math.PI * 2;

          // Spin properties
          this.rotation = Math.random() * 360;
          this.rotationSpeed = Math.random() * 240 - 120;

          this.opacity = 1;
        }

        update(delta) {
          this.y += this.speedY * delta;
          this.x +=
            this.speedX * delta +
            Math.sin(this.y * this.swaySpeed + this.swayOffset) * 48 * delta;
          this.rotation += this.rotationSpeed * delta;

          // Gradually fade out as gifts approach the bottom 100px of the screen
          if (this.y > canvas.height - 100) {
            this.opacity -= 1.2 * delta;
          }
        }

        draw() {
          if (this.opacity <= 0) return;

          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate((this.rotation * Math.PI) / 180);
          ctx.globalAlpha = Math.max(0, this.opacity);

          const s = this.size;

          // Draw gift box body
          ctx.fillStyle = this.baseColor;
          ctx.fillRect(-s / 2, -s / 2, s, s);

          // Draw vertical ribbon
          ctx.fillStyle = this.ribbonColor;
          ctx.fillRect(-s / 10, -s / 2, s / 5, s);

          // Draw horizontal ribbon
          ctx.fillRect(-s / 2, -s / 10, s, s / 5);

          // Draw top bow
          ctx.beginPath();
          ctx.ellipse(
            -s / 4,
            -s / 2 - 1,
            s / 5,
            s / 10,
            -Math.PI / 4,
            0,
            Math.PI * 2,
          );
          ctx.ellipse(
            s / 4,
            -s / 2 - 1,
            s / 5,
            s / 10,
            Math.PI / 4,
            0,
            Math.PI * 2,
          );
          ctx.fill();

          ctx.restore();
        }
      }

      function triggerGiftRain() {
        for (let i = 0; i < CONFIG.count; i++) {
          giftList.push(new Gift());
        }
      }

      // Render loop
      let lastFrameTime;

      function animate(now) {
        const delta = lastFrameTime
          ? Math.min((now - lastFrameTime) / 1000, 0.05)
          : 0;
        lastFrameTime = now;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = giftList.length - 1; i >= 0; i--) {
          const gift = giftList[i];
          gift.update(delta);
          gift.draw();

          // Remove gifts that have drifted completely off-screen or faded away
          if (gift.y > canvas.height + 50 || gift.opacity <= 0) {
            giftList.splice(i, 1);
          }
        }

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);

      // ==========================================
      // 3. CALLBACK (COMFYJS)
      // ==========================================

      if (location.search.includes("preview")) triggerGiftRain();

      if (TWITCH.enabled) {
        ComfyJS.onCommand = (_, command) => {
          if (`!${command}`.toLowerCase() === TWITCH.command.toLowerCase())
            triggerGiftRain();
        };
        ComfyJS.Init(TWITCH.channel);
      }
    </script>
  </body>
</html>
