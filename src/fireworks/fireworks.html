<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fireworks</title>

    <style>
      /* Transparent background is required for OBS overlays */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: sans-serif;
      }

      /* Canvas styling for OBS overlays */
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
  </head>
  <body>
    <canvas id="fireworks-canvas"></canvas>

    <script>
      // ==========================================
      // 1. CONFIGURATION
      // ==========================================

      const CONFIG = {
        rocketCount: 25,
        launchDelay: 150,
        particlesPerBurst: 180,
      };

      const TWITCH = {
        enabled: false,
        channel: "your_twitch_channel",
        command: "!fireworks",
      };

      // ==========================================
      // 2. CONSTANTS
      // ==========================================

      const canvas = document.getElementById("fireworks-canvas");
      const ctx = canvas.getContext("2d");

      const particles = [];
      const rockets = [];

      // Dynamic canvas resizing to match OBS source dimensions
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      // ==========================================
      // 3. ANIMATION
      // ==========================================

      class Rocket {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = canvas.height;
          this.targetY =
            Math.random() * (canvas.height * 0.6) + canvas.height * 0.05;
          this.speed = Math.random() * 5 + 8;
          this.angle = Math.atan2(
            this.targetY - this.y,
            Math.random() * canvas.width * 0.6 + canvas.width * 0.2 - this.x,
          );
          this.velocity = {
            x: Math.cos(this.angle) * this.speed,
            y: Math.sin(this.angle) * this.speed,
          };
          this.hue = Math.random() * 360;
        }

        update() {
          this.x += this.velocity.x;
          this.y += this.velocity.y;
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
          ctx.fillStyle = `hsl(${this.hue}, 100%, 75%)`;
          ctx.fill();
        }
      }

      class Particle {
        constructor(x, y, hue) {
          this.x = x;
          this.y = y;
          this.hue = hue;
          this.gravity = 0.09;
          this.friction = 0.94;

          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 10 + 3;
          this.velocity = {
            x: Math.cos(angle) * speed,
            y: Math.sin(angle) * speed,
          };
          this.alpha = 1;
          this.decay = Math.random() * 0.012 + 0.012;
        }

        update() {
          this.velocity.y += this.gravity;
          this.velocity.x *= this.friction;
          this.velocity.y *= this.friction;
          this.x += this.velocity.x;
          this.y += this.velocity.y;
          this.alpha -= this.decay;
        }

        draw() {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.beginPath();
          ctx.arc(this.x, this.y, Math.random() * 2.5 + 1, 0, Math.PI * 2);
          ctx.shadowBlur = 12;
          ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
          ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
          ctx.fill();
          ctx.restore();
        }
      }

      function explode(x, y) {
        const count = CONFIG.particlesPerBurst;
        const baseHue = Math.random() * 360;
        for (let i = 0; i < count; i++) {
          const hueVariation = baseHue + (Math.random() * 80 - 40);
          particles.push(new Particle(x, y, hueVariation));
        }
      }

      function triggerFireworks() {
        let rocketsLaunched = 0;

        const spawnInterval = setInterval(() => {
          if (rocketsLaunched < CONFIG.rocketCount) {
            rockets.push(new Rocket());
            rocketsLaunched++;
          } else {
            clearInterval(spawnInterval);
          }
        }, CONFIG.launchDelay);
      }

      // Main animation loop
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Update and draw active rockets
        for (let i = rockets.length - 1; i >= 0; i--) {
          const r = rockets[i];
          r.update();
          r.draw();

          // Explode rocket when it reaches its apex or target altitude
          if (r.velocity.y >= 0 || r.y <= r.targetY) {
            explode(r.x, r.y);
            rockets.splice(i, 1);
          }
        }

        // Update and draw active particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.update();
          p.draw();

          // Remove faded-out particles
          if (p.alpha <= 0) {
            particles.splice(i, 1);
          }
        }

        requestAnimationFrame(animate);
      }

      animate();

      // ==========================================
      // 3. CALLBACK (COMFYJS)
      // ==========================================

      if (location.search.includes("preview")) triggerFireworks();

      if (TWITCH.enabled) {
        ComfyJS.onCommand = (_, command) => {
          if (`!${command}`.toLowerCase() === TWITCH.command.toLowerCase())
            triggerFireworks();
        };
        ComfyJS.Init(TWITCH.channel);
      }
    </script>
  </body>
</html>
