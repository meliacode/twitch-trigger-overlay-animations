<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confetti Explosion</title>

    <style>
      /* Transparent background is required for OBS overlays */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: sans-serif;
      }

      /* Canvas styling for OBS overlays */
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <canvas id="confetti-canvas"></canvas>

    <script>
      // ==========================================
      // 1. CONFIGURATION
      // ==========================================

      const CONFIG = {
        centerParticles: 300,
        sideParticles: 250,
        spread: 120,
        velocity: 50,
      };

      const TWITCH = {
        enabled: false,
        channel: "your_twitch_channel",
        command: "!confetti-explosion",
      };

      // ==========================================
      // 2. CONSTANTS
      // ==========================================

      const canvas = document.getElementById("confetti-canvas");

      // Initialize the canvas-confetti instance with window scaling and high-performance workers
      const localConfetti = confetti.create(canvas, {
        resize: true,
        useWorker: true,
      });

      // ==========================================
      // 3. ANIMATION
      // ==========================================

      function triggerConfetti() {
        // Shared physics settings across all emitters
        const defaults = {
          spread: 360,
          ticks: 150,
          gravity: 1.2,
          decay: 0.94,
          startVelocity: 45,
        };

        // Emitter 1: Massive center-screen burst
        localConfetti({
          ...defaults,
          particleCount: CONFIG.centerParticles,
          spread: CONFIG.spread,
          origin: { y: 0.55 },
        });

        // Emitter 2: Left corner cannon shooting upwards-right
        localConfetti({
          ...defaults,
          particleCount: CONFIG.sideParticles,
          angle: 55,
          spread: 70,
          startVelocity: CONFIG.velocity,
          origin: { x: 0, y: 0.85 },
        });

        // Emitter 3: Right corner cannon shooting upwards-left
        localConfetti({
          ...defaults,
          particleCount: CONFIG.sideParticles,
          angle: 125,
          spread: 70,
          startVelocity: CONFIG.velocity,
          origin: { x: 1, y: 0.85 },
        });
      }

      // ==========================================
      // 3. CALLBACK (COMFYJS)
      // ==========================================

      if (location.search.includes("preview")) triggerConfetti();

      if (TWITCH.enabled) {
        ComfyJS.onCommand = (_, command) => {
          if (`!${command}`.toLowerCase() === TWITCH.command.toLowerCase())
            triggerConfetti();
        };
        ComfyJS.Init(TWITCH.channel);
      }
    </script>
  </body>
</html>
