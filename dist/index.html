<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS HTML Animations — Demo</title>
  <link rel="stylesheet" href="demo.css">
</head>
<body>
  <main class="shell">
    <h1>OBS HTML Animations</h1>
    <p>Choose a source, then play it locally.</p>
    <div class="controls">
      <select id="animation" aria-label="Animation">
        <option value="../src/send-love/index.html">Send Love</option>
        <option value="../src/party-lights/index.html">Party Lights</option>
        <option value="../src/fireworks/index.html">Fireworks</option>
        <option value="../src/swarm-of-butterflies/index.html">Swarm of Butterflies</option>
        <option value="../src/confetti/index.html">Confetti</option>
      </select>
      <button id="play">Play animation</button>
    </div>
    <iframe id="stage" title="Animation preview" src="../src/send-love/index.html"></iframe>
  </main>
  <script>
    const select = document.querySelector('#animation');
    const stage = document.querySelector('#stage');
    document.querySelector('#play').addEventListener('click', () => { stage.src = `${select.value}?preview=${Date.now()}`; });
    select.addEventListener('change', () => { stage.src = select.value; });
  </script>
</body>
</html>
