<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBS HTML Animations — Demo</title>
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <main class="shell">
      <h1>OBS HTML Animations</h1>
      <p>Choose a source, then play it to see the animation locally.</p>

      <div class="controls">
        <select id="animation" aria-label="Animation">
          <option value="../src/confetti-explosion/confetti-explosion.html">
            Confetti Explosion
          </option>
          <option value="../src/confetti-rain/confetti-rain.html">
            Confetti Rain
          </option>
          <option value="../src/fireworks/fireworks.html">Fireworks</option>
          <option value="../src/gifts-rain/gifts-rain.html">Gifts Rain</option>
          <option value="../src/meteor-shower/meteor-shower.html">
            Meteor Shower
          </option>
          <option value="../src/party-lights-laser/party-lights-laser.html">
            Party Lights Laser
          </option>
          <option
            value="../src/party-lights-spotlights/party-lights-spotlights.html"
          >
            Party Lights Spotlights
          </option>
          <option value="../src/spread-love-rainbow/spread-love-rainbow.html">
            Spread Love Rainbow
          </option>
          <option value="../src/swarm-of-butterflies/swarm-of-butterflies.html">
            Swarm of Butterflies
          </option>
        </select>
        <button id="play" type="button">Play animation</button>
      </div>

      <iframe
        id="iframe-container"
        title="Animation preview"
        src="../src/confetti-explosion/confetti-explosion.html"
      ></iframe>
    </main>

    <script>
      const select = document.querySelector("#animation");
      const container = document.querySelector("#iframe-container");

      document.querySelector("#play").addEventListener("click", () => {
        container.src = `${select.value}?preview=${Date.now()}`;
      });
      select.addEventListener("change", () => {
        container.src = select.value;
      });
    </script>
  </body>
</html>
