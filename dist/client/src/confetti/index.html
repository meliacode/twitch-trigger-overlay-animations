<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS — Confetti</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent}#stage{position:fixed;inset:0;pointer-events:none}.piece{position:absolute;top:-4vh;width:var(--w);height:var(--h);background:var(--color);border-radius:2px;animation:fall var(--duration) cubic-bezier(.2,.65,.45,1) forwards}@keyframes fall{to{transform:translate3d(var(--drift),112vh,0) rotate(var(--spin));opacity:.2}}
  </style>
  <script src="https://unpkg.com/comfy.js@latest/dist/comfy.min.js"></script>
</head>
<body>
  <div id="stage" aria-hidden="true"></div>
  <script>
    // Configuration — adjust these values for this browser source.
    const CONFIG = { count: 180, duration: 4200, delay: 13, colors: ['#ff3b83','#ffcd45','#36d6ff','#7856ff','#44e09c'] };
    // Constants
    const TWITCH = { enabled: false, channel: "your_twitch_channel", command: "!confetti" };
    const stage=document.querySelector('#stage'),random=(a,b)=>Math.random()*(b-a)+a;
    // Main animation logic
    function play(){for(let i=0;i<CONFIG.count;i++)setTimeout(()=>{const p=document.createElement('i');p.className='piece';p.style.left=`${random(0,100)}vw`;p.style.setProperty('--w',`${random(6,13)}px`);p.style.setProperty('--h',`${random(8,21)}px`);p.style.setProperty('--color',CONFIG.colors[i%CONFIG.colors.length]);p.style.setProperty('--duration',`${CONFIG.duration+random(-850,950)}ms`);p.style.setProperty('--drift',`${random(-18,18)}vw`);p.style.setProperty('--spin',`${random(360,1260)}deg`);stage.append(p);p.addEventListener('animationend',()=>p.remove())},i*CONFIG.delay)}
    // Twitch trigger with ComfyJS
    if(location.search.includes('preview'))play();
    if(TWITCH.enabled){ComfyJS.onCommand=(_,command)=>{if(`!${command}`.toLowerCase()===TWITCH.command.toLowerCase())play()};ComfyJS.Init(TWITCH.channel)}
  </script>
</body>
</html>
