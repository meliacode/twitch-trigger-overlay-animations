<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS — Send Love</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent}#stage{position:fixed;inset:0;pointer-events:none}.heart{position:absolute;bottom:-12vh;font:var(--size)/1 serif;filter:drop-shadow(0 4px 5px #ff1c7a66);animation:rise var(--duration) cubic-bezier(.14,.7,.3,1) forwards}@keyframes rise{0%{transform:translate3d(0,0,0) scale(.4) rotate(0);opacity:0}10%{opacity:1}100%{transform:translate3d(var(--drift),-125vh,0) scale(1.25) rotate(26deg);opacity:0}}
  </style>
  <script src="https://unpkg.com/comfy.js@latest/dist/comfy.min.js"></script>
</head>
<body>
  <div id="stage" aria-hidden="true"></div>
  <script>
    // Configuration — adjust these values for this browser source.
    const CONFIG = { count: 28, duration: 4200, delay: 70, minSize: 28, maxSize: 72 };
    // Constants
    const TWITCH = { enabled: false, channel: "your_twitch_channel", command: "!love" };
    const stage = document.querySelector('#stage');
    const random = (min, max) => Math.random() * (max - min) + min;
    // Main animation logic
    function play() { for (let i = 0; i < CONFIG.count; i++) setTimeout(() => { const heart = document.createElement('span'); heart.className = 'heart'; heart.textContent = Math.random() > .18 ? '♥' : '♡'; heart.style.left = `${random(2,96)}vw`; heart.style.setProperty('--size', `${random(CONFIG.minSize, CONFIG.maxSize)}px`); heart.style.setProperty('--duration', `${CONFIG.duration}ms`); heart.style.setProperty('--drift', `${random(-18,18)}vw`); heart.style.color = ['#ff2b70','#ff80ad','#ffb3cd','#fff'][i % 4]; stage.append(heart); heart.addEventListener('animationend', () => heart.remove()); }, i * CONFIG.delay); }
    // Twitch trigger with ComfyJS
    if (location.search.includes('preview')) play();
    if (TWITCH.enabled) { ComfyJS.onCommand = (_, command) => { if (`!${command}`.toLowerCase() === TWITCH.command.toLowerCase()) play(); }; ComfyJS.Init(TWITCH.channel); }
  </script>
</body>
</html>
