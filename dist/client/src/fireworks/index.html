<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS — Fireworks</title>
  <style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent}canvas{width:100%;height:100%;display:block}</style>
  <script src="https://unpkg.com/comfy.js@latest/dist/comfy.min.js"></script>
</head>
<body>
  <canvas id="stage" aria-hidden="true"></canvas>
  <script>
    // Configuration — adjust these values for this browser source.
    const CONFIG = { bursts: 5, particles: 70, duration: 4200, delay: 520, colors: ['#ff4f81','#ffd54a','#48e7ff','#b78cff','#ffffff'] };
    // Constants
    const TWITCH = { enabled: false, channel: "your_twitch_channel", command: "!fireworks" };
    const canvas=document.querySelector('#stage'),ctx=canvas.getContext('2d');let particles=[],running=false;
    const resize=()=>{canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)};addEventListener('resize',resize);resize();
    // Main animation logic
    function burst(){const x=Math.random()*innerWidth*.8+innerWidth*.1,y=Math.random()*innerHeight*.45+innerHeight*.08,color=CONFIG.colors[Math.floor(Math.random()*CONFIG.colors.length)];for(let i=0;i<CONFIG.particles;i++){const a=Math.PI*2*i/CONFIG.particles,v=2+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1,color})}}
    function frame(){ctx.clearRect(0,0,innerWidth,innerHeight);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.055;p.life-=.015;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,2.4,0,7);ctx.fill()});particles=particles.filter(p=>p.life>0);ctx.globalAlpha=1;if(running||particles.length)requestAnimationFrame(frame)}
    function play(){if(!running)requestAnimationFrame(frame);running=true;for(let i=0;i<CONFIG.bursts;i++)setTimeout(burst,i*CONFIG.delay);setTimeout(()=>running=false,CONFIG.duration)}
    // Twitch trigger with ComfyJS
    if (location.search.includes('preview')) play();
    if (TWITCH.enabled) { ComfyJS.onCommand = (_, command) => { if (`!${command}`.toLowerCase() === TWITCH.command.toLowerCase()) play(); }; ComfyJS.Init(TWITCH.channel); }
  </script>
</body>
</html>
