name: Dependabot security auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-merge:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'meliacode/twitch-trigger-overlay-animations' &&
      github.event.pull_request.number > 4
    runs-on: ubuntu-latest

    steps:
      - name: Verify Dependabot metadata
        uses: dependabot/fetch-metadata@v3

      - name: Check out the proposed update
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Validate formatting
        run: npm run format:check

      - name: Merge the security update
        run: gh pr merge --squash --delete-branch "$PR_URL"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
